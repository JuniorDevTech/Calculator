<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Modern Calculator</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>🧮 Calculator</h1>
      <p>Simple calculator built with HTML, CSS and JavaScript</p>
    </header>

    <main>
      <section class="calculatrice">
        <input
          type="text"
          id="inputElment"
          readonly
          aria-label="Calculator display" />

        <div class="buttons">
          <div class="topRow">
            <button class="bot" id="clear">AC</button>
            <button class="bot" id="delete">⌫</button>
          </div>

          <div class="topRow">
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator" data-op="/">÷</button>
          </div>

          <div class="topRow">
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator" data-op="*">×</button>
          </div>

          <div class="topRow">
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn operator" data-op="-">−</button>
          </div>

          <div class="topRow">
            <button class="btn number">0</button>
            <button class="btn number">.</button>
            <button class="btn operator" data-op="+">+</button>
            <button class="btn equals" id="equals">=</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Built by Junior Dev Tech 🚀</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
